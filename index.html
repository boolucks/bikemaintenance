<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Maintenance</title>
    
    <!-- iOS PWA対応 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="メンテナンス">
    <meta name="theme-color" content="#000000">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23007AFF' width='100' height='100' rx='20'/><text x='50' y='70' font-size='60' text-anchor='middle' fill='white'>🏍️</text></svg>">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-font-smoothing: antialiased;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px 100px 20px;
        }

        .header {
            padding: 16px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 28px;
            cursor: pointer;
            margin-left: -8px;
        }

        .header-title {
            font-size: 34px;
            font-weight: 700;
            line-height: 41px;
            letter-spacing: 0.374px;
            flex: 1;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .main-card {
            background: #1c1c1e;
            border-radius: 20px;
            padding: 24px 20px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .main-card:active {
            transform: scale(0.97);
        }

        .main-card-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .main-card-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .main-card-value {
            font-size: 28px;
            font-weight: 600;
            margin-top: auto;
            word-break: break-all;
        }
        
        .main-card-value.date-value {
            font-size: 20px;
        }

        .main-card-label {
            font-size: 13px;
            color: #8e8e93;
        }

        .new-record-btn-main {
            background: #007AFF;
            border: none;
            border-radius: 16px;
            padding: 16px;
            color: #ffffff;
            font-size: 17px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            min-height: 56px;
        }

        .info-card {
            background: #1c1c1e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .info-icon {
            width: 56px;
            height: 56px;
            background: #2c2c2e;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 24px;
            font-weight: 600;
        }

        .actions-section {
            background: #1c1c1e;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .search-box {
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            border-radius: 10px;
            padding: 11px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .search-icon {
            font-size: 20px;
            color: #8e8e93;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 17px;
            outline: none;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .filter-btn {
            flex: 1;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            border-radius: 10px;
            padding: 11px 16px;
            color: #ffffff;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .new-record-btn {
            flex: 1.2;
            background: #007AFF;
            border: none;
            border-radius: 10px;
            padding: 11px 16px;
            color: #ffffff;
            font-size: 17px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
        }

        .section-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .history-card {
            background: #1c1c1e;
            border-radius: 13px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .history-card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .history-date {
            font-size: 18px;
            font-weight: 600;
        }

        .history-actions {
            display: flex;
            gap: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 20px;
            cursor: pointer;
        }

        .history-details {
            font-size: 15px;
            color: #8e8e93;
            line-height: 20px;
        }

        .tab-bar-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid #3a3a3c;
            padding: 4px 0;
            padding-bottom: max(4px, env(safe-area-inset-bottom));
            display: flex;
            z-index: 100;
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px 0;
            gap: 2px;
            background: none;
            border: none;
            color: #8e8e93;
            cursor: pointer;
        }

        .tab-item.active {
            color: #007AFF;
        }

        .tab-icon-text {
            font-size: 25px;
        }

        .tab-label {
            font-size: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            align-items: flex-end;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1c1c1e;
            border-radius: 13px 13px 0 0;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: #007AFF;
            font-size: 17px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: #8e8e93;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            border-radius: 10px;
            padding: 11px 16px;
            color: #ffffff;
            font-size: 17px;
        }

        .form-input:focus {
            outline: none;
            border-color: #007AFF;
        }

        .form-textarea {
            min-height: 88px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            background: #007AFF;
            border: none;
            border-radius: 10px;
            padding: 11px 16px;
            color: #ffffff;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
        }

        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .tab {
            background: #2c2c2e;
            border: none;
            border-radius: 20px;
            padding: 6px 16px;
            color: #8e8e93;
            font-size: 15px;
            white-space: nowrap;
            cursor: pointer;
        }

        .tab.active {
            background: #007AFF;
            color: #ffffff;
            font-weight: 600;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8e8e93;
        }
    </style>
</head>
<body>
    <!-- Main Screen -->
    <div class="screen active" id="mainScreen">
        <div class="container">
            <div class="header">
                <div class="header-title">Maintenance</div>
            </div>

            <div class="main-grid">
                <div class="main-card" onclick="showDetail('oil')">
                    <div class="main-card-icon">🛢️</div>
                    <div class="main-card-title">Engine oil</div>
                    <div class="main-card-value" id="oilValue">— km</div>
                    <div class="main-card-label">未記録</div>
                </div>

                <div class="main-card" onclick="showDetail('tire')">
                    <div class="main-card-icon">🛞</div>
                    <div class="main-card-title">Tire</div>
                    <div class="main-card-value" id="tireValue">— km</div>
                    <div class="main-card-label">未記録</div>
                </div>

                <div class="main-card" onclick="showDetail('chain')">
                    <div class="main-card-icon">⛓️</div>
                    <div class="main-card-title">Chain</div>
                    <div class="main-card-value" id="chainValue">—</div>
                    <div class="main-card-label">前回交換日</div>
                </div>

                <div class="main-card" onclick="showDetail('sprocket')">
                    <div class="main-card-icon">⚙️</div>
                    <div class="main-card-title">Sprocket</div>
                    <div class="main-card-value" id="sprocketValue">—</div>
                    <div class="main-card-label">前回交換日</div>
                </div>
            </div>

            <button class="new-record-btn-main" onclick="openNewRecordModal()">
                <span>+</span>
                <span>新規記録</span>
            </button>
        </div>
    </div>

    <!-- Detail Screen -->
    <div class="screen" id="detailScreen">
        <div class="container">
            <div class="header">
                <button class="back-btn" onclick="showMain()">‹</button>
                <div class="header-title" id="detailTitle">Engine oil</div>
                <div class="header-icon" id="detailIcon">🛢️</div>
            </div>

            <div class="info-card">
                <div class="info-icon">
                    <img src="01published_with_changes.png" alt="次回交換" style="width: 28px; height: 28px; filter: invert(1);">
                </div>
                <div class="info-content">
                    <div class="info-label">次回交換まで</div>
                    <div class="info-value" id="detailNextChange">5,000 km</div>
                </div>
            </div>

            <div class="info-card">
                <div class="info-icon">
                    <img src="02speed.png" alt="総走行距離" style="width: 28px; height: 28px; filter: invert(1);">
                </div>
                <div class="info-content">
                    <div class="info-label">総走行距離</div>
                    <div class="info-value" id="detailTotalDistance">3,000 km</div>
                </div>
            </div>

            <div class="info-card">
                <div class="info-icon">
                    <img src="03calendar_today.png" alt="前回交換日" style="width: 28px; height: 28px; filter: invert(1);">
                </div>
                <div class="info-content">
                    <div class="info-label">前回交換日</div>
                    <div class="info-value" id="detailLastDate">2025/08/11</div>
                </div>
            </div>

            <div class="actions-section">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="検索" id="detailSearch">
                </div>
                <div class="action-buttons">
                    <button class="filter-btn">
                        <span>全ての期間</span>
                        <span>▼</span>
                    </button>
                    <button class="new-record-btn" onclick="openNewRecordModal()">
                        <span>+</span>
                        <span>新規記録</span>
                    </button>
                </div>
            </div>

            <div class="section-header" id="detailHistoryTitle">オイル交換履歴</div>
            <div id="detailHistoryList"></div>
        </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar-fixed">
        <button class="tab-item active" onclick="showMain()">
            <span class="tab-icon-text">🏠</span>
            <span class="tab-label">Home</span>
        </button>
        <button class="tab-item" onclick="openSettingsModal()">
            <span class="tab-icon-text">⚙️</span>
            <span class="tab-label">Setting</span>
        </button>
    </div>

    <!-- New Record Modal -->
    <div class="modal" id="newRecordModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">新規記録</div>
                <button class="close-btn" onclick="closeNewRecordModal()">閉じる</button>
            </div>

            <div class="tab-bar">
                <button class="tab active" data-type="oil">🛢️ オイル</button>
                <button class="tab" data-type="tire">🛞 タイヤ</button>
                <button class="tab" data-type="chain">⛓️ チェーン</button>
                <button class="tab" data-type="sprocket">⚙️ スプロケ</button>
                <button class="tab" data-type="other">🔧 その他</button>
            </div>

            <form id="maintenanceForm">
                <input type="hidden" id="maintenanceType" value="oil">
                <div class="form-group">
                    <label class="form-label">日付</label>
                    <input type="date" id="date" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">走行距離（km）</label>
                    <input type="number" id="odometer" class="form-input" placeholder="例: 3000" required>
                </div>

                <div id="content-oil" class="tab-content active">
                    <div class="form-group">
                        <label class="form-label">オイル銘柄</label>
                        <input type="text" id="oilBrand" class="form-input" placeholder="例: 10W40 1L">
                    </div>
                </div>

                <div id="content-tire" class="tab-content">
                    <div class="form-group">
                        <label class="form-label">交換箇所</label>
                        <input type="text" id="tirePosition" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">タイヤ銘柄</label>
                        <input type="text" id="tireBrand" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">タイヤサイズ</label>
                        <input type="text" id="tireSize" class="form-input">
                    </div>
                </div>

                <div id="content-chain" class="tab-content">
                    <div class="form-group">
                        <label class="form-label">チェーン銘柄</label>
                        <input type="text" id="chainBrand" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">チェーンサイズ</label>
                        <input type="text" id="chainSize" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">チェーンタイプ</label>
                        <input type="text" id="chainType" class="form-input">
                    </div>
                </div>

                <div id="content-sprocket" class="tab-content">
                    <div class="form-group">
                        <label class="form-label">交換箇所</label>
                        <input type="text" id="sprocketPosition" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">丁数</label>
                        <input type="text" id="sprocketTeeth" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">スプロケット銘柄</label>
                        <input type="text" id="sprocketBrand" class="form-input">
                    </div>
                </div>

                <div id="content-other" class="tab-content">
                    <div class="form-group">
                        <label class="form-label">整備項目</label>
                        <input type="text" id="otherItem" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">詳細</label>
                        <input type="text" id="otherDetails" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">費用（円）</label>
                    <input type="number" id="cost" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">メモ</label>
                    <textarea id="note" class="form-input form-textarea"></textarea>
                </div>
                <button type="submit" class="submit-btn">保存</button>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">設定</div>
                <button class="close-btn" onclick="closeSettingsModal()">閉じる</button>
            </div>
            <div class="form-group">
                <button class="submit-btn" onclick="exportData()" style="background: #2c2c2e;">エクスポート</button>
            </div>
            <div class="form-group">
                <button class="submit-btn" onclick="document.getElementById('fileInput').click()" style="background: #2c2c2e;">インポート</button>
                <input type="file" id="fileInput" accept=".json" onchange="importData(event)" style="display: none;">
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'maintenanceLogs';
        const INTERVALS = { oil: 3000, tire: 4500, chain: 0, sprocket: 0 };
        let currentType = 'oil';

        document.getElementById('date').valueAsDate = new Date();

        function showMain() {
            document.getElementById('mainScreen').classList.add('active');
            document.getElementById('detailScreen').classList.remove('active');
            document.querySelectorAll('.tab-item')[0].classList.add('active');
            document.querySelectorAll('.tab-item')[1].classList.remove('active');
        }

        function showDetail(type) {
            currentType = type;
            const titles = { oil: 'Engine oil', tire: 'Tire', chain: 'Chain', sprocket: 'Sprocket' };
            const icons = { oil: '🛢️', tire: '🛞', chain: '⛓️', sprocket: '⚙️' };
            const historyTitles = { oil: 'オイル交換履歴', tire: 'タイヤ交換履歴', chain: 'チェーン交換履歴', sprocket: 'スプロケット交換履歴' };
            
            document.getElementById('detailTitle').textContent = titles[type];
            document.getElementById('detailIcon').textContent = icons[type];
            document.getElementById('detailHistoryTitle').textContent = historyTitles[type];
            
            updateDetailInfo();
            displayDetailHistory();
            
            document.getElementById('mainScreen').classList.remove('active');
            document.getElementById('detailScreen').classList.add('active');
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const type = this.dataset.type;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                const contentEl = document.getElementById(`content-${type}`);
                if (contentEl) contentEl.classList.add('active');
                document.getElementById('maintenanceType').value = type;
            });
        });

        function loadLogs() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveLogs(logs) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
        }

        function updateMainCards() {
            const logs = loadLogs();
            ['oil', 'tire', 'chain', 'sprocket'].forEach(type => {
                const typeLogs = logs.filter(log => log.type === type);
                const valueEl = document.getElementById(`${type}Value`);
                
                if (typeLogs.length === 0) {
                    if (type === 'chain' || type === 'sprocket') {
                        valueEl.textContent = '—';
                        valueEl.classList.add('date-value');
                    } else {
                        valueEl.textContent = '— km';
                        valueEl.classList.remove('date-value');
                    }
                } else {
                    const latest = typeLogs.reduce((latest, log) => 
                        new Date(log.date) > new Date(latest.date) ? log : latest
                    );
                    
                    if (type === 'chain' || type === 'sprocket') {
                        // Show last maintenance date
                        const date = new Date(latest.date);
                        const dateStr = `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
                        valueEl.textContent = dateStr;
                        valueEl.classList.add('date-value');
                    } else {
                        // Show next km for oil and tire
                        const nextChange = latest.odometer + INTERVALS[type];
                        valueEl.textContent = `${nextChange.toLocaleString()} km`;
                        valueEl.classList.remove('date-value');
                    }
                }
            });
        }

        function updateDetailInfo() {
            const logs = loadLogs();
            const typeLogs = logs.filter(log => log.type === currentType);
            
            if (typeLogs.length === 0) {
                document.getElementById('detailNextChange').textContent = '—';
                document.getElementById('detailTotalDistance').textContent = '—';
                document.getElementById('detailLastDate').textContent = '—';
            } else {
                const latest = typeLogs.reduce((latest, log) => 
                    new Date(log.date) > new Date(latest.date) ? log : latest
                );
                const nextChange = latest.odometer + INTERVALS[currentType];
                document.getElementById('detailNextChange').textContent = `${nextChange.toLocaleString()} km`;
                document.getElementById('detailTotalDistance').textContent = `${latest.odometer.toLocaleString()} km`;
                
                const date = new Date(latest.date);
                document.getElementById('detailLastDate').textContent = 
                    `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
            }
        }

        function displayDetailHistory() {
            const logs = loadLogs();
            const typeLogs = logs.filter(log => log.type === currentType);
            const historyList = document.getElementById('detailHistoryList');
            
            if (typeLogs.length === 0) {
                historyList.innerHTML = '<div class="empty-state">記録がありません</div>';
                return;
            }

            typeLogs.sort((a, b) => new Date(b.date) - new Date(a.date));

            historyList.innerHTML = typeLogs.map((log, index) => {
                const details = [];
                details.push(`${log.odometer.toLocaleString()}km`);
                
                if (log.type === 'oil' && log.oilBrand) details.push(log.oilBrand);
                if (log.type === 'tire') {
                    if (log.tireBrand) details.push(log.tireBrand);
                    if (log.tireSize) details.push(log.tireSize);
                }
                if (log.type === 'chain') {
                    if (log.chainBrand) details.push(log.chainBrand);
                    if (log.chainSize) details.push(log.chainSize);
                }
                if (log.type === 'sprocket' && log.sprocketTeeth) details.push(log.sprocketTeeth);
                if (log.cost) details.push(`費用：¥${log.cost.toLocaleString()}`);
                if (log.note) details.push(log.note);

                const date = new Date(log.date);
                const dateStr = `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;

                return `
                    <div class="history-card">
                        <div class="history-card-header">
                            <div class="history-date">${dateStr}</div>
                            <div class="history-actions">
                                <button class="icon-btn" onclick="deleteLog(${index})">🗑️</button>
                            </div>
                        </div>
                        <div class="history-details">
                            ${details.map(d => `<div>${d}</div>`).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('maintenanceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const type = document.getElementById('maintenanceType').value;
            const newLog = {
                type: type,
                date: document.getElementById('date').value,
                odometer: parseInt(document.getElementById('odometer').value),
                cost: document.getElementById('cost').value ? parseInt(document.getElementById('cost').value) : null,
                note: document.getElementById('note').value
            };

            if (type === 'oil') newLog.oilBrand = document.getElementById('oilBrand').value;
            else if (type === 'tire') {
                newLog.tirePosition = document.getElementById('tirePosition').value;
                newLog.tireBrand = document.getElementById('tireBrand').value;
                newLog.tireSize = document.getElementById('tireSize').value;
            } else if (type === 'chain') {
                newLog.chainBrand = document.getElementById('chainBrand').value;
                newLog.chainSize = document.getElementById('chainSize').value;
                newLog.chainType = document.getElementById('chainType').value;
            } else if (type === 'sprocket') {
                newLog.sprocketPosition = document.getElementById('sprocketPosition').value;
                newLog.sprocketTeeth = document.getElementById('sprocketTeeth').value;
                newLog.sprocketBrand = document.getElementById('sprocketBrand').value;
            } else if (type === 'other') {
                newLog.otherItem = document.getElementById('otherItem').value;
                newLog.otherDetails = document.getElementById('otherDetails').value;
            }

            const logs = loadLogs();
            logs.push(newLog);
            saveLogs(logs);
            this.reset();
            document.getElementById('date').valueAsDate = new Date();
            
            updateMainCards();
            updateDetailInfo();
            displayDetailHistory();
            closeNewRecordModal();
        });

        function deleteLog(index) {
            if (!confirm('この記録を削除しますか？')) return;
            let logs = loadLogs();
            const typeLogs = logs.filter(log => log.type === currentType);
            const logToDelete = typeLogs.sort((a, b) => new Date(b.date) - new Date(a.date))[index];
            const originalIndex = logs.findIndex(log => 
                log.date === logToDelete.date && log.odometer === logToDelete.odometer && log.type === logToDelete.type
            );
            logs.splice(originalIndex, 1);
            saveLogs(logs);
            updateMainCards();
            updateDetailInfo();
            displayDetailHistory();
        }

        function exportData() {
            const logs = loadLogs();
            if (logs.length === 0) { alert('エクスポートするデータがありません'); return; }
            const dataStr = JSON.stringify(logs, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            const today = new Date();
            link.download = `bike-maintenance-${today.getFullYear()}${String(today.getMonth() + 1).padStart(2, '0')}${String(today.getDate()).padStart(2, '0')}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!file.name.endsWith('.json')) { alert('JSONファイルを選択してください'); event.target.value = ''; return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (!Array.isArray(importedData)) throw new Error('無効なデータ');
                    if (!confirm(`${importedData.length}件をインポートします。上書きされますがよろしいですか？`)) { 
                        event.target.value = ''; return; 
                    }
                    saveLogs(importedData);
                    updateMainCards();
                    updateDetailInfo();
                    displayDetailHistory();
                    alert('✓ インポート完了');
                } catch (error) {
                    alert('エラー: ' + error.message);
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function openNewRecordModal() { document.getElementById('newRecordModal').classList.add('active'); }
        function closeNewRecordModal() { document.getElementById('newRecordModal').classList.remove('active'); }
        function openSettingsModal() { document.getElementById('settingsModal').classList.add('active'); }
        function closeSettingsModal() { document.getElementById('settingsModal').classList.remove('active'); }

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('active');
            });
        });

        updateMainCards();
    </script>
</body>
</html>
